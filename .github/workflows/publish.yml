name: Publish to Open VSX

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *' # Runs daily at noon

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download tar.gz from latest release
        id: get-latest-tag
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/cadamsdev/vscode-jetbrains-icon-theme/releases/latest | grep '"tag_name"' | head -n 1 | cut -d '"' -f4)
          echo "Latest tag: $LATEST_TAG"
          if [ -z "$LATEST_TAG" ]; then
            echo "Could not determine latest tag. Aborting."
            exit 1
          fi
          curl -L -o source.tar.gz "https://github.com/cadamsdev/vscode-jetbrains-icon-theme/archive/refs/tags/$LATEST_TAG.tar.gz"
          echo "VERSION=${LATEST_TAG#v}" >> $GITHUB_ENV

      - name: Check if tag already exists in this repository
        id: check-tag
        run: |
          TAG_EXISTS=$(git ls-remote --tags origin "refs/tags/$VERSION" | wc -l)
          echo "Tag exists ($VERSION): $TAG_EXISTS"
          echo "exists=$TAG_EXISTS" >> $GITHUB_OUTPUT

      - name: Stop if tag already exists
        if: github.event_name != 'workflow_dispatch' && steps.check-tag.outputs.exists == '1'
        run: |
          echo "Tag $VERSION already exists in this repository. Skipping build and publish."

      - name: Extract tar.gz content
        if: github.event_name == 'workflow_dispatch' || steps.check-tag.outputs.exists != '1'
        run: |
          mkdir source
          tar -xzf source.tar.gz -C source --strip-components=1

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch' || steps.check-tag.outputs.exists != '1'
        working-directory: ./source
        run: npm ci

      - name: Prebuild
        if: github.event_name == 'workflow_dispatch' || steps.check-tag.outputs.exists != '1'
        working-directory: ./source
        run: npm run prebuild

      - name: Package extension
        if: github.event_name == 'workflow_dispatch' || steps.check-tag.outputs.exists != '1'
        working-directory: ./source
        run: npm run package

      # - name: Publish to Open VSX
      #   uses: HaaLeo/publish-vscode-extension@v2
      #   if: github.event_name == 'workflow_dispatch' || steps.check-tag.outputs.exists != '1'
      #   with:
      #     extensionFile: source/vscode-jetbrains-icon-theme-${{ env.VERSION }}.vsix
      #     pat: ${{ secrets.OPEN_VSX_TOKEN }}

      - name: Upload VSIX to GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'workflow_dispatch' || steps.check-tag.outputs.exists != '1'
        with:
          tag_name: "${{ env.VERSION }}"
          files: source/vscode-jetbrains-icon-theme-${{ env.VERSION }}.vsix
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
