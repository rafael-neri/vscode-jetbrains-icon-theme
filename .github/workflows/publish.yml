name: Publish to Open VSX

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *' # Runs daily at noon

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download tar.gz from latest release
        id: get-latest-tag
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/cadamsdev/vscode-jetbrains-icon-theme/releases/latest | grep '"tag_name"' | head -n 1 | cut -d '"' -f4)
          echo "Latest tag: $LATEST_TAG"
          if [ -z "$LATEST_TAG" ]; then
            echo "Could not determine latest tag. Aborting."
            exit 1
          fi
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV
          curl -L -o source.tar.gz "https://github.com/cadamsdev/vscode-jetbrains-icon-theme/archive/refs/tags/$LATEST_TAG.tar.gz"

      - name: Check if tag already exists in this repository
        id: check-tag
        run: |
          TAG_EXISTS=$(git ls-remote --tags origin "refs/tags/$LATEST_TAG" | wc -l)
          echo "Tag exists: $TAG_EXISTS"
          echo "exists=$TAG_EXISTS" >> $GITHUB_OUTPUT

      - name: Stop if tag already exists
        if: github.event_name != 'workflow_dispatch' && steps.check-tag.outputs.exists == '1'
        run: |
          echo "Tag $LATEST_TAG already exists in this repository. Skipping build and publish."
          exit 0

      # Add or update tag if manual run
      - name: Create or update tag (manual only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -f "$LATEST_TAG"
          git push origin ":refs/tags/$LATEST_TAG" # delete old tag if exists
          git push origin "$LATEST_TAG"

      - name: Extract tar.gz content
        run: |
          mkdir source
          tar -xzf source.tar.gz -C source --strip-components=1

      - name: Install dependencies
        working-directory: ./source
        run: npm ci

      - name: Prebuild
        working-directory: ./source
        run: npm run prebuild

      - name: Get extension version
        id: get-version
        run: |
          VERSION=${LATEST_TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Package extension
        working-directory: ./source
        run: npm run package

      - name: Publish to Open VSX
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          extensionFile: ${{ github.workspace }}/source/vscode-jetbrains-icon-theme-${{ env.LATEST_TAG#v }}.vsix
          pat: ${{ secrets.OPEN_VSX_TOKEN }}

      - name: Upload VSIX to GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
        with:
          files: ${{ github.workspace }}/source/vscode-jetbrains-icon-theme-${{ env.LATEST_TAG#v }}.vsix
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
